version: '3'

vars:
  DOTENV_PATH: '.env'

tasks:

  default:
    cmds:
    - task --list

  check_clouds:
    desc: "Vérifie que clouds.yaml existe"
    cmds:
      - '[ -f {{.OS_CLIENT_CONFIG_FILE}} ] || { echo "❌ clouds.yaml introuvable"; exit 1; }'

  setup:
    desc: "Setup initial du projet (interactif)"
    cmds:
    - '[ ! -f go.mod ] && go mod init github.com/cloud-pool-managers/vm-pool-managers || echo "go.mod exists"'
    - 'go get github.com/charmbracelet/huh@latest'
    - 'go run config.go'
    - task: check_clouds
    - task: init_control
    - task: init_micro
    - task: init_front

  init_control:
    dir: control_center
    cmds:
      - '[ ! -f go.mod ] && go mod init control_center || echo "go.mod exists"'

  init_micro:
    dir: microservices/openstack
    cmds:
      - '[ ! -f go.mod ] && go mod init vm-pool-managers/microservice || echo "go.mod exists"'

  init_front:
    dir: frontend
    cmds:
      - npm install

  build:
    desc: "Build le microservice OpenStack"
    dir: microservices/openstack
    sources:
    - "**/*.go"
    generates:
    - ./bin/app
    cmds:
    - go mod tidy
    - go build -o ./bin/app .

  backend:
    desc: "Lance le microservice OpenStack"
    deps: [build]
    dir: microservices/openstack
    cmds:
      - |
        export PORT=8080
        export DOTENV_PATH={{.DOTENV_PATH}}
        ./bin/app

  caddy:
    desc: "Build et lance Caddy (port 443)"
    dir: caddy
    cmds:
      - docker build -t my-caddy .
      - docker rm -f caddy 2>/dev/null || true
      - docker run -d -p 443:443 --add-host=host.docker.internal:host-gateway --name caddy my-caddy

  frontend:
    desc: "Lance le frontend en dev"
    dir: frontend
    cmds:
      - sudo npm run dev -- --host --port 80

  frontexpose:
    desc: "Lance le frontend exposé sur le réseau"
    dir: frontend
    cmds:
      - npm run dev -- --host

  control:
    desc: "Lance le control center"
    dir: control_center
    cmds:
    - go mod tidy
    - go run main.go

  dev:
    desc: "Lance tout (backend + control + frontend) via tmux"
    cmds:
      - |
        tmux kill-session -t poolmanager 2>/dev/null || true
        tmux new-session -d -s poolmanager

        tmux rename-window -t poolmanager:0 backend
        tmux send-keys -t poolmanager:backend "task backend" C-m

        tmux new-window -t poolmanager -n control
        tmux send-keys -t poolmanager:control \
          "until nc -z localhost 50052; do echo '...'; sleep 1; done && task control" C-m

        tmux new-window -t poolmanager -n frontend
        tmux send-keys -t poolmanager:frontend "task frontexpose" C-m

        tmux attach -t poolmanager

  clean:
    desc: "Supprime les fichiers build et DB"
    cmds:
    - rm -rf ./microservices/openstack/bin
    - rm -f ./microservices/openstack/PoolManagerVM.db

  cli:
    desc: "Ouvre le CLI OpenStack"
    cmds:
    - |
      export OS_CLIENT_CONFIG_FILE={{.OS_CLIENT_CONFIG_FILE}}
      export OS_CLOUD={{.OS_CLOUD}}
      pkgx openstack