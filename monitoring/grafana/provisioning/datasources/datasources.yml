apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: cpm-prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    uid: cpm-loki
    access: proxy
    url: http://loki:3100
    jsonData:
      # Corrélation logs → trace : un trace_id présent dans un log ouvre la trace Tempo.
      derivedFields:
        - name: trace_id
          matcherType: label
          matcherRegex: trace_id
          datasourceUid: cpm-tempo
          url: "$${__value.raw}"

  # Backend de traces (Tempo) — alimenté via l'OTel Collector.
  - name: Tempo
    type: tempo
    uid: cpm-tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      # Corrélation trace → logs : depuis une trace, retrouver les logs liés dans Loki.
      tracesToLogsV2:
        datasourceUid: cpm-loki
        filterByTraceID: true
        filterBySpanID: false

  # Données « métier » directement depuis PostgreSQL (lecture seule).
  # Permet des dashboards d'usage à partir des tables existantes
  # (vm_instances, serverpools, students, github_sessions…).
  - name: CloudPoolManager PostgreSQL
    type: postgres
    uid: cpm-postgres
    access: proxy
    url: ${CPM_PG_HOST}:5432
    database: ${CPM_PG_DB}
    user: ${CPM_PG_USER}
    secureJsonData:
      password: ${CPM_PG_PASSWORD}
    jsonData:
      # SÉCURITÉ : TLS exigé vers PostgreSQL (chiffrement en transit). Si le serveur PG n'a pas
      # TLS activé, le configurer plutôt que de repasser à "disable".
      sslmode: require
      postgresVersion: 1500
