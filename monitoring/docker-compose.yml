# Stack d'observabilité — à déployer sur une VM du projet infra (vmpoolmanager).
# Grafana (UI) + Prometheus (métriques) + Loki (logs) + Tempo (traces) + OTel Collector
# + Alertmanager (alertes e-mail) + node-exporter/cAdvisor (infra).
# Voir monitoring/README.md pour le déploiement.
#
# SÉCURITÉ (revue 2026-07) — exposition minimale :
#   - Les UI/admin (Grafana, Prometheus, Alertmanager) et les exporters d'infra
#     (node-exporter, cAdvisor, Tempo, métriques OTel) sont bindés sur 127.0.0.1 :
#     accès via tunnel SSH ou reverse-proxy authentifié, JAMAIS d'IP publique.
#   - Seuls Loki (:3100, promtail distant) et l'ingestion OTLP (:4317/:4318) écoutent sur
#     toutes les interfaces car des agents distants s'y connectent → à RESTREINDRE au réseau
#     interne par le security group OpenStack.
#   - Les services se joignent entre eux par nom de service (réseau compose), sans publication.

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    restart: unless-stopped
    depends_on:
      - alertmanager
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=90d
    ports:
      - "127.0.0.1:9090:9090"

  # Routage et envoi des alertes (e-mail SMTP). Config : ./alertmanager/alertmanager.yml
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager-data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "127.0.0.1:9093:9093"

  # Métriques hôte (CPU/mém/disque/réseau) de la VM d'observabilité.
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "127.0.0.1:9100:9100"

  # Métriques par conteneur (CPU/mém/IO) de la stack.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "127.0.0.1:8080:8080"

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100" # promtail distant → RESTREINDRE au réseau interne (security group)

  # Backend de traces (OTLP → stockage local, requêtable par Grafana).
  tempo:
    image: grafana/tempo:2.5.0
    container_name: tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200" # API de requête Tempo (Grafana la joint par le réseau compose)

  # Point d'entrée OTLP : reçoit traces/métriques/logs des services Go et les
  # répartit vers Tempo (traces) / Prometheus (métriques) / Loki (logs).
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yml"]
    depends_on:
      - tempo
      - loki
    volumes:
      - ./otel-collector/config.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4317:4317" # OTLP gRPC (services distants) → RESTREINDRE au réseau interne (security group)
      - "4318:4318" # OTLP HTTP  (services distants) → RESTREINDRE au réseau interne (security group)
      - "127.0.0.1:8889:8889" # métriques (Prometheus les scrape par le réseau compose)

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - tempo
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      # SÉCURITÉ : mot de passe OBLIGATOIRE (compose échoue si GF_ADMIN_PASSWORD absent) —
      # plus de défaut "changeme".
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:?definir GF_ADMIN_PASSWORD dans monitoring/.env}
      # Datasource PostgreSQL (lecture seule) injectée dans le provisioning
      CPM_PG_HOST: ${CPM_PG_HOST}
      CPM_PG_DB: ${CPM_PG_DB:-control_center}
      CPM_PG_USER: ${CPM_PG_USER:-grafana_ro}
      CPM_PG_PASSWORD: ${CPM_PG_PASSWORD}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
  tempo-data:
  alertmanager-data:
