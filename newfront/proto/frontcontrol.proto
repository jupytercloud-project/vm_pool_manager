syntax = "proto3";
package frontcontrol;

option go_package = "./frontcontrolpb";

import "google/protobuf/timestamp.proto";


message CreateUserRequest {
    string username = 1;
    string password = 2;
    string email = 3;
}

message CreateUserResponse {
    string user_id = 1;
    bool success = 2;
}

message AddPersonalSSHKeyRequest {
    string user_id = 1;
    string public_key = 2;
}

message AddPersonnalSSHKeyResponse {
  bool success = 1;
}

message AuthenticateUserRequest {
    string email = 1;
    string password = 2;
}

message AuthenticateUserResponse {
    string token = 1;
    bool success = 2;
}

message Image {
    string id = 1;
    string name = 2;
    string status = 3;
    string tags = 4; // CSV format
    string container_format = 5;
    string disk_format = 6;
    int32 min_disk_gigabytes = 7;
    int32 min_ram_megabytes = 8;
    string owner = 9;
    bool protected = 10;
    string visibility = 11;
    bool hidden = 12;
    string checksum = 13;
    int64 size_bytes = 14;
    google.protobuf.Timestamp created_at = 15;
    google.protobuf.Timestamp updated_at = 16;
    string file = 17;
    string schema = 18;
    int64 virtual_size = 19;
    string import_methods = 20; // CSV format
    string store_ids = 21; // CSV format
}

message Flavor {
    string id = 1;
    string name = 2;
    int32 disk = 3;
    int32 ram = 4;
    int32 vcpus = 5;
    double rxtx_factor = 6;
    int32 swap = 7;
    int32 ephemeral = 8;
    bool is_public = 9;
    string description = 10;
    string extra_specs = 11; // JSON serialized
}

message Network {
    string id = 1;
    string name = 2;
    string description = 3;
    bool admin_state_up = 4;
    string status = 5;
    string tenant_id = 6;
    string project_id = 7;
    bool shared = 8;
    int32 revision_number = 9;
    string subnets = 10; // CSV
    string availability_zone_hints = 11; // CSV
    string tags = 12; // CSV
}

message CreateConfigRequest {
    string user = 1;
    string key = 2;
    string value = 3;
}

message CreateConfigResponse {
    bool success = 1;
}

message UpdateConfigRequest {
    string user = 1;
    string key = 2;
    string value = 3;
}

message UpdateConfigResponse {
    bool success = 1;
}

message DeleteConfigRequest {
    string user = 1;
    string key = 2;
}

message DeleteConfigResponse {
    bool success = 1;
}

message GetConfigRequest {
    string user = 1;
    string key = 2;
}

message GetConfigResponse {
    string value = 1;
    string key = 2;
}

message CreatePoolRequest {
    string user = 1;
    string name = 2;
    string image = 3;
    string flavor = 4;
    string network = 5;
    string config = 6;
    string min_vm = 7;
    string max_vm = 8;
    map<string, string> metadata = 9;
    google.protobuf.Timestamp start_time = 10;
    int32 time_window = 11;
}

message CreatePoolResponse {
    string pool_id = 1;
    bool success = 2;
}

message DeletePoolRequest {
    string user = 1;
    string pool_id = 2;
}

message DeletePoolResponse {
    bool success = 1;
}

message GetPoolRequest {
    string user = 1;
    string pool_id = 2;
}

message GetPoolResponse {
    reserved 8;
    string name = 1;
    string image = 2;
    string flavor = 3;
    string network = 4;
    string config = 5;
    int32 min_vm = 6;
    int32 max_vm = 7;
}

message UpdateDataUserRequest {
    string user = 1;
}

enum Status {
    STATUS_UNKNOWN = 0;
    CREATE = 1;
    UPDATE = 2;
    DELETE = 3;
}

enum Type {
    TYPE_UNKNOWN = 0;
    SERVERPOOL = 1;
    SERVER = 2;
    CONFIG = 3;
}

message UpdateDataUserResponse {
    string user = 1;
    Status status = 2;
    Type type = 3;
    map<string, string> data = 4;
}

message RebuildServerRequest {
    string user = 1;
    string pool_id = 2;
    string server_id = 3;
}

message RebuildServerResponse {
    bool success = 1;
}

message UserRequest {
    string user = 1;
}

message Server {
    string id = 1;
    string name = 2;
    string status = 3;
    string image = 4;
    string flavor = 5;
    string network = 6;
    string ip_address = 7;
    google.protobuf.Timestamp created_at = 8;
    google.protobuf.Timestamp updated_at = 9;
    map<string, string> metadata = 10;
    string user_id = 11;
    string addressed_ip = 12;
}

message ServerPool {
    string id = 1;
    string name = 2;
    string image = 3;
    string flavor = 4;
    string network = 5;
    string config = 6;
    int32 min_vm = 7;
    int32 max_vm = 8;
    map<string, string> metadata = 9;
    string user_id = 10;
}

message Config {
    string user_id = 1;
    string name = 2;
    string data = 3;
}

message ExistData {
    bool exist = 1;
}

message ListSSHPublicKeysRequest {
    string user_id = 1;
    string serverpool_id = 2;
    repeated string pubkeys = 3;
}

message ListSSHPublicKeysResponse {
    bool success = 1;
}

message AttribVMinPoolRequest {
    string serverpool_id = 1;
    string pubkey = 2;
    string user_id = 3;
}

message AttribVMinPoolResponse {
    bool success = 1;
    string addressed_ip = 2;
}

message PoolWithKeyRequest {
    string pubkey = 1;
}

message PoolWithKeyResponse {
    string pool_id = 1;
    string user_id = 2;
}

message Student {
    uint32 id = 1;
    string name = 2;
    string ssh_key = 3;
    string ip = 4;
}

message ListStudentsRequest {
    string poolname = 1;
    string user = 2;
}

message ListStudentsResponse {
    repeated Student students = 1;
}

message AddStudentRequest {
    string poolname = 1;
    string user = 2;
    repeated Student students = 3;
}

message AddStudentResponse {
    bool success = 1;
    string error_message = 2;
}

// -------------------- Services --------------------
// AuthService manages user authentication and creation.
// Might change to use OIDC in the future.
service AuthService {
    // CreateUser creates a new user with the provided details.
    rpc CreateUser (CreateUserRequest) returns (CreateUserResponse);
    // AuthenticateUser verifies user credentials and returns an authentication token.
    rpc AuthenticateUser (AuthenticateUserRequest) returns (AuthenticateUserResponse);
}

// GatherDataService retrieves various resources associated with a user
// and populates stores with datas (like images, flavors, networks).
service GatherDataService {
    // GetAllImages retrieves all images
    rpc GetAllImages ( UserRequest ) returns (stream Image);
    // GetAllFlavors retrieves all flavors
    rpc GetAllFlavors ( UserRequest ) returns (stream Flavor);
    // GetAllNetworks retrieves all networks
    rpc GetAllNetworks ( UserRequest ) returns (stream Network);
    // ExistServer checks if a server exists for a user to open a stream
    rpc ExistServer ( UserRequest ) returns ( ExistData );
    // ExistServerPools checks if server pools exist for a user to open a stream
    rpc ExistServerPools ( UserRequest ) returns ( ExistData );
    // ExistConfigs checks if configs exist for a user to open a stream
    rpc ExistConfigs ( UserRequest ) returns ( ExistData );
    // GetAllServers retrieves all servers for a user
    rpc GetAllServers ( UserRequest ) returns (stream Server);
    // GetAllServerPools retrieves all server pools for a user
    rpc GetAllServerPools ( UserRequest ) returns (stream ServerPool);
    // GetAllConfigs retrieves all configs for a user
    rpc GetAllConfigs ( UserRequest ) returns (stream Config);

}

// ConfigService manages configuration settings for users.
service ConfigService {
    // CreateConfig creates a new configuration entry for a user.
    rpc CreateConfig (CreateConfigRequest) returns (CreateConfigResponse);
    // UpdateConfig updates an existing configuration entry for a user.
    rpc UpdateConfig (UpdateConfigRequest) returns (UpdateConfigResponse);
    // DeleteConfig deletes a configuration entry for a user.
    rpc DeleteConfig (DeleteConfigRequest) returns (DeleteConfigResponse);
    // GetConfig retrieves a configuration entry for a user.
    rpc GetConfig (GetConfigRequest) returns (GetConfigResponse);
}

// PoolService manages server pools and associated operations.
service PoolService {
    // CreatePool creates a new server pool for a user.
    rpc CreatePool (CreatePoolRequest) returns (CreatePoolResponse);
    // GetPool retrieves details of a specific server pool for a user.
    rpc GetPool (GetPoolRequest) returns (GetPoolResponse);
    // GetAllPools retrieves all server pools for a user.
    rpc GetAllPools (GetPoolRequest) returns (stream GetPoolResponse);
    // DeletePool deletes a specific server pool for a user.
    rpc DeletePool (DeletePoolRequest) returns (DeletePoolResponse);
    // RebuildServer rebuilds a server within a pool for a user.
    rpc RebuildServer (RebuildServerRequest) returns (RebuildServerResponse);
    // AddServer adds a new server to a pool for a user.
    rpc AddServer (CreatePoolRequest) returns (RebuildServerResponse);
    // AddSSHKeys adds SSH public keys to a server pool for a user.
    rpc AddSSHKeys (ListSSHPublicKeysRequest) returns (ListSSHPublicKeysResponse);
    // ListStudents lists students associated with a server pool for a user.
    rpc ListStudents (ListStudentsRequest) returns (ListStudentsResponse);
    // AddStudents adds students to a server pool for a user.
    rpc AddStudents (AddStudentRequest) returns (AddStudentResponse);
}

// UserService streams updates related to user data such as server pools, servers, and configurations.
service UserService {
    // UpdateDataUser streams updates related to user data.
    rpc UpdateDataUser (UpdateDataUserRequest) returns (stream UpdateDataUserResponse);
    // AddPersonalSSHKey adds a personal SSH key for a user.
    rpc AddPersonalSSHKey (AddPersonalSSHKeyRequest) returns (AddPersonnalSSHKeyResponse);
}

// AttribVMService handles VM attribution based on public keys.
service AttribVMService {
    // AttribVMinPool attributes a VM in the pool to a user based on the public key.
    rpc AttribVMinPool (AttribVMinPoolRequest) returns (AttribVMinPoolResponse);
    // ReturnPoolWithKey returns the pools associated with a given public key.
    rpc ReturnPoolWithKey (PoolWithKeyRequest) returns (stream PoolWithKeyResponse);
}